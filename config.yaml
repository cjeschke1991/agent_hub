data_dir: data

slice_order:
  - priorities
  - gmail_stub

stale_hours:
  default: 36
  priorities: 48
  gmail_stub: 24

briefing:
  title: "Daily Briefing"

# Optional: set TMDB_API_KEY in your environment instead of committing a key here.
tmdb:
  api_key: ""

# Optional: Rotten Tomatoes scores via OMDb (set OMDB_API_KEY in your environment).
omdb:
  api_key: ""

movie_recommender:
  weights:
    genre: 0.35
    cast_director: 0.25
    year: 0.15
    rating: 0.15
    keywords: 0.10

# Optional: set SPOTIFY_CLIENT_ID and SPOTIFY_CLIENT_SECRET in your environment instead.
spotify:
  client_id: ""
  client_secret: ""

music_recommender:
  weights:
    song_genre: 0.30
    song_audio_features: 0.25
    song_artist_affinity: 0.20
    song_year: 0.15
    song_popularity: 0.10
    artist_genre: 0.40
    artist_related_artists: 0.25
    artist_popularity: 0.20
    artist_era: 0.15
